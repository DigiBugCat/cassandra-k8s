apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /etc/grafana/dashboards
          foldersFromFilesStructure: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
data:
  orchestrator.json: |
    {
      "uid": "orchestrator-overview",
      "title": "Orchestrator Overview",
      "tags": ["cassandra"],
      "timezone": "browser",
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "namespace",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "" },
            "query": "label_values(api_requests_total, namespace)",
            "current": { "text": "All", "value": "$__all" },
            "includeAll": true,
            "multi": false,
            "refresh": 2
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "API Request Rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(api_requests_total{namespace=~\"$namespace\"}[5m])) by (path, method)",
              "legendFormat": "{{method}} {{path}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "fillOpacity": 10, "lineWidth": 2 }
            }
          }
        },
        {
          "id": 2,
          "title": "Error Rate (non-2xx)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(api_requests_total{namespace=~\"$namespace\", status!~\"2..\"}[5m])) by (path, status)",
              "legendFormat": "{{status}} {{path}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "fillOpacity": 10, "lineWidth": 2 },
              "color": { "mode": "palette-classic" }
            }
          }
        },
        {
          "id": 3,
          "title": "Request Latency p50 / p90 / p99",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus" },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(api_request_duration_seconds_bucket{namespace=~\"$namespace\"}[5m])) by (le))",
              "legendFormat": "p50"
            },
            {
              "expr": "histogram_quantile(0.90, sum(rate(api_request_duration_seconds_bucket{namespace=~\"$namespace\"}[5m])) by (le))",
              "legendFormat": "p90"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(api_request_duration_seconds_bucket{namespace=~\"$namespace\"}[5m])) by (le))",
              "legendFormat": "p99"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "fillOpacity": 5, "lineWidth": 2 }
            }
          }
        },
        {
          "id": 4,
          "title": "Sessions Created",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(sessions_created_total{namespace=~\"$namespace\"}[5m])) by (namespace)",
              "legendFormat": "{{namespace}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": { "fillOpacity": 10, "lineWidth": 2 }
            }
          }
        },
        {
          "id": 5,
          "title": "Total Requests by Status",
          "type": "stat",
          "gridPos": { "h": 4, "w": 24, "x": 0, "y": 16 },
          "datasource": { "type": "prometheus" },
          "targets": [
            {
              "expr": "sum(api_requests_total{namespace=~\"$namespace\"}) by (status)",
              "legendFormat": "HTTP {{status}}"
            }
          ],
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "value_and_name"
          }
        },
        {
          "id": 6,
          "title": "Requests by Path",
          "type": "piechart",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 20 },
          "datasource": { "type": "prometheus" },
          "targets": [
            {
              "expr": "sum(api_requests_total{namespace=~\"$namespace\"}) by (path)",
              "legendFormat": "{{path}}"
            }
          ]
        },
        {
          "id": 7,
          "title": "Active Connections (Traefik)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 20 },
          "datasource": { "type": "prometheus" },
          "targets": [
            {
              "expr": "sum(traefik_open_connections) by (entrypoint)",
              "legendFormat": "{{entrypoint}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": { "fillOpacity": 15, "lineWidth": 2 }
            }
          }
        },
        {
          "id": 8,
          "title": "Warm Pool Hit / Miss Rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 28 },
          "datasource": { "type": "prometheus" },
          "targets": [
            {
              "expr": "rate(warm_pool_hits_total{namespace=~\"$namespace\"}[5m])",
              "legendFormat": "hits"
            },
            {
              "expr": "rate(warm_pool_misses_total{namespace=~\"$namespace\"}[5m])",
              "legendFormat": "misses (cold spawn)"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": { "fillOpacity": 15, "lineWidth": 2 }
            }
          }
        },
        {
          "id": 9,
          "title": "Token Pool Usage",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 28 },
          "datasource": { "type": "prometheus" },
          "targets": [
            {
              "expr": "token_pool_usage{namespace=~\"$namespace\"}",
              "legendFormat": "token #{{token_index}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": { "fillOpacity": 15, "lineWidth": 2, "stacking": { "mode": "normal" } }
            }
          }
        }
      ],
      "schemaVersion": 39
    }
  cluster.json: |
    {
      "uid": "cluster-health",
      "title": "Cluster Health",
      "tags": ["cassandra", "infrastructure"],
      "timezone": "browser",
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Pods Running",
          "type": "stat",
          "gridPos": { "h": 4, "w": 5, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus" },
          "targets": [
            {
              "expr": "count(count by (pod, namespace) (container_cpu_usage_seconds_total{container!=\"\", container!=\"POD\"}))"
            }
          ],
          "options": { "colorMode": "background", "graphMode": "area", "textMode": "value" },
          "fieldConfig": { "defaults": { "color": { "mode": "fixed", "fixedColor": "blue" }, "thresholds": { "steps": [{ "value": null, "color": "blue" }] } } }
        },
        {
          "id": 2,
          "title": "Nodes",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 5, "y": 0 },
          "datasource": { "type": "prometheus" },
          "targets": [
            {
              "expr": "count(up{job=\"kubelet\"})"
            }
          ],
          "options": { "colorMode": "background", "graphMode": "none", "textMode": "value" },
          "fieldConfig": { "defaults": { "color": { "mode": "fixed", "fixedColor": "green" }, "thresholds": { "steps": [{ "value": null, "color": "green" }] } } }
        },
        {
          "id": 3,
          "title": "Cluster CPU Usage",
          "type": "gauge",
          "gridPos": { "h": 4, "w": 5, "x": 9, "y": 0 },
          "datasource": { "type": "prometheus" },
          "targets": [
            {
              "expr": "1 - avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m]))"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "percentunit", "min": 0, "max": 1, "thresholds": { "steps": [{ "value": null, "color": "green" }, { "value": 0.7, "color": "yellow" }, { "value": 0.9, "color": "red" }] } } }
        },
        {
          "id": 4,
          "title": "Cluster Memory Usage",
          "type": "gauge",
          "gridPos": { "h": 4, "w": 5, "x": 14, "y": 0 },
          "datasource": { "type": "prometheus" },
          "targets": [
            {
              "expr": "1 - sum(node_memory_MemAvailable_bytes) / sum(node_memory_MemTotal_bytes)"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "percentunit", "min": 0, "max": 1, "thresholds": { "steps": [{ "value": null, "color": "green" }, { "value": 0.7, "color": "yellow" }, { "value": 0.9, "color": "red" }] } } }
        },
        {
          "id": 5,
          "title": "GPU Slices In Use",
          "type": "stat",
          "gridPos": { "h": 4, "w": 5, "x": 19, "y": 0 },
          "datasource": { "type": "prometheus" },
          "targets": [
            {
              "expr": "count(container_gpu_utilization) or vector(0)",
              "legendFormat": "in use"
            }
          ],
          "options": { "colorMode": "background", "graphMode": "none", "textMode": "value" },
          "fieldConfig": { "defaults": { "color": { "mode": "fixed", "fixedColor": "purple" }, "thresholds": { "steps": [{ "value": null, "color": "purple" }] } } }
        },
        {
          "id": 6,
          "title": "",
          "type": "row",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 4 },
          "panels": []
        },
        {
          "id": 7,
          "title": "CPU Usage by Node",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 5 },
          "datasource": { "type": "prometheus" },
          "targets": [
            {
              "expr": "1 - avg by (node) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m]))",
              "legendFormat": "{{node}}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "percentunit", "min": 0, "max": 1, "custom": { "fillOpacity": 20, "lineWidth": 2, "stacking": { "mode": "none" } } } }
        },
        {
          "id": 8,
          "title": "Memory Usage by Node",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 5 },
          "datasource": { "type": "prometheus" },
          "targets": [
            {
              "expr": "node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes",
              "legendFormat": "used — {{node}}"
            },
            {
              "expr": "node_memory_MemTotal_bytes",
              "legendFormat": "total — {{node}}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "bytes", "custom": { "fillOpacity": 15, "lineWidth": 2 } } }
        },
        {
          "id": 9,
          "title": "",
          "type": "row",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 13 },
          "panels": []
        },
        {
          "id": 10,
          "title": "Top 10 Pods by CPU",
          "type": "bargauge",
          "gridPos": { "h": 10, "w": 12, "x": 0, "y": 14 },
          "datasource": { "type": "prometheus" },
          "targets": [
            {
              "expr": "topk(10, sum by (pod, namespace) (rate(container_cpu_usage_seconds_total{container!=\"\", container!=\"POD\"}[5m])))",
              "legendFormat": "{{namespace}}/{{pod}}"
            }
          ],
          "options": { "orientation": "horizontal", "displayMode": "gradient" },
          "fieldConfig": { "defaults": { "unit": "percentunit", "color": { "mode": "continuous-blues" }, "thresholds": { "steps": [{ "value": null, "color": "blue" }] } } }
        },
        {
          "id": 11,
          "title": "Top 10 Pods by Memory",
          "type": "bargauge",
          "gridPos": { "h": 10, "w": 12, "x": 12, "y": 14 },
          "datasource": { "type": "prometheus" },
          "targets": [
            {
              "expr": "topk(10, sum by (pod, namespace) (container_memory_working_set_bytes{container!=\"\", container!=\"POD\"}))",
              "legendFormat": "{{namespace}}/{{pod}}"
            }
          ],
          "options": { "orientation": "horizontal", "displayMode": "gradient" },
          "fieldConfig": { "defaults": { "unit": "bytes", "color": { "mode": "continuous-purples" }, "thresholds": { "steps": [{ "value": null, "color": "purple" }] } } }
        },
        {
          "id": 12,
          "title": "",
          "type": "row",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 24 },
          "panels": []
        },
        {
          "id": 13,
          "title": "Network Receive by Namespace",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 25 },
          "datasource": { "type": "prometheus" },
          "targets": [
            {
              "expr": "sum by (namespace) (rate(container_network_receive_bytes_total[5m]))",
              "legendFormat": "rx — {{namespace}}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "Bps", "custom": { "fillOpacity": 15, "lineWidth": 2, "stacking": { "mode": "normal" } } } }
        },
        {
          "id": 14,
          "title": "Network Transmit by Namespace",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 25 },
          "datasource": { "type": "prometheus" },
          "targets": [
            {
              "expr": "sum by (namespace) (rate(container_network_transmit_bytes_total[5m]))",
              "legendFormat": "tx — {{namespace}}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "Bps", "custom": { "fillOpacity": 15, "lineWidth": 2, "stacking": { "mode": "normal" } } } }
        },
        {
          "id": 15,
          "title": "Disk I/O by Node",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 33 },
          "datasource": { "type": "prometheus" },
          "targets": [
            {
              "expr": "sum by (node) (rate(container_fs_reads_bytes_total[5m]))",
              "legendFormat": "read — {{node}}"
            },
            {
              "expr": "sum by (node) (rate(container_fs_writes_bytes_total[5m]))",
              "legendFormat": "write — {{node}}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "Bps", "custom": { "fillOpacity": 10, "lineWidth": 2 } } }
        }
      ],
      "schemaVersion": 39
    }
  sessions.json: |
    {
      "uid": "agent-sessions",
      "title": "Agent Sessions",
      "tags": ["cassandra"],
      "timezone": "browser",
      "refresh": "30s",
      "time": { "from": "now-6h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "namespace",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "" },
            "query": "label_values(sessions_created_total, namespace)",
            "current": { "text": "All", "value": "$__all" },
            "includeAll": true,
            "multi": false,
            "refresh": 2
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Active Sessions",
          "type": "stat",
          "gridPos": { "h": 5, "w": 5, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus" },
          "targets": [
            {
              "expr": "sum(sessions_active{namespace=~\"$namespace\"}) or vector(0)"
            }
          ],
          "options": { "colorMode": "background", "graphMode": "area", "textMode": "value" },
          "fieldConfig": { "defaults": { "color": { "mode": "fixed", "fixedColor": "green" }, "thresholds": { "steps": [{ "value": null, "color": "green" }, { "value": 5, "color": "yellow" }, { "value": 10, "color": "red" }] } } }
        },
        {
          "id": 2,
          "title": "Total Sessions",
          "type": "stat",
          "gridPos": { "h": 5, "w": 5, "x": 5, "y": 0 },
          "datasource": { "type": "prometheus" },
          "targets": [
            {
              "expr": "sum(sessions_created_total{namespace=~\"$namespace\"}) or vector(0)"
            }
          ],
          "options": { "colorMode": "background", "graphMode": "area", "textMode": "value" },
          "fieldConfig": { "defaults": { "color": { "mode": "fixed", "fixedColor": "blue" }, "thresholds": { "steps": [{ "value": null, "color": "blue" }] } } }
        },
        {
          "id": 3,
          "title": "Warm Pool Hit Rate",
          "type": "stat",
          "gridPos": { "h": 5, "w": 5, "x": 10, "y": 0 },
          "datasource": { "type": "prometheus" },
          "targets": [
            {
              "expr": "sum(warm_pool_hits_total{namespace=~\"$namespace\"}) / (sum(warm_pool_hits_total{namespace=~\"$namespace\"}) + sum(warm_pool_misses_total{namespace=~\"$namespace\"}))"
            }
          ],
          "options": { "colorMode": "background", "graphMode": "none", "textMode": "value" },
          "fieldConfig": { "defaults": { "unit": "percentunit", "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "value": null, "color": "red" }, { "value": 0.5, "color": "yellow" }, { "value": 0.8, "color": "green" }] } } }
        },
        {
          "id": 4,
          "title": "Total Cost (USD)",
          "type": "stat",
          "gridPos": { "h": 5, "w": 5, "x": 15, "y": 0 },
          "datasource": { "type": "prometheus" },
          "targets": [
            {
              "expr": "sum(cost_usd_total{namespace=~\"$namespace\"}) or vector(0)"
            }
          ],
          "options": { "colorMode": "background", "graphMode": "area", "textMode": "value" },
          "fieldConfig": { "defaults": { "unit": "currencyUSD", "decimals": 2, "color": { "mode": "fixed", "fixedColor": "orange" }, "thresholds": { "steps": [{ "value": null, "color": "orange" }] } } }
        },
        {
          "id": 5,
          "title": "Total Tokens",
          "type": "stat",
          "gridPos": { "h": 5, "w": 4, "x": 20, "y": 0 },
          "datasource": { "type": "prometheus" },
          "targets": [
            {
              "expr": "sum(tokens_consumed_total{namespace=~\"$namespace\"}) or vector(0)"
            }
          ],
          "options": { "colorMode": "background", "graphMode": "area", "textMode": "value" },
          "fieldConfig": { "defaults": { "unit": "short", "color": { "mode": "fixed", "fixedColor": "purple" }, "thresholds": { "steps": [{ "value": null, "color": "purple" }] } } }
        },
        {
          "id": 6,
          "title": "",
          "type": "row",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 5 },
          "panels": []
        },
        {
          "id": 7,
          "title": "Sessions Created Over Time",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 6 },
          "datasource": { "type": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(sessions_created_total{namespace=~\"$namespace\"}[5m])) by (model)",
              "legendFormat": "{{model}}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "ops", "custom": { "fillOpacity": 20, "lineWidth": 2 } } }
        },
        {
          "id": 8,
          "title": "Active Sessions by Status",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 6 },
          "datasource": { "type": "prometheus" },
          "targets": [
            {
              "expr": "sum(sessions_active{namespace=~\"$namespace\"}) by (status)",
              "legendFormat": "{{status}}"
            }
          ],
          "fieldConfig": { "defaults": { "custom": { "fillOpacity": 20, "lineWidth": 2, "stacking": { "mode": "normal" } } } }
        },
        {
          "id": 9,
          "title": "",
          "type": "row",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 14 },
          "panels": []
        },
        {
          "id": 10,
          "title": "Message Response Time",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 15 },
          "datasource": { "type": "prometheus" },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(message_duration_seconds_bucket{namespace=~\"$namespace\"}[5m])) by (le))",
              "legendFormat": "p50"
            },
            {
              "expr": "histogram_quantile(0.90, sum(rate(message_duration_seconds_bucket{namespace=~\"$namespace\"}[5m])) by (le))",
              "legendFormat": "p90"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(message_duration_seconds_bucket{namespace=~\"$namespace\"}[5m])) by (le))",
              "legendFormat": "p99"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "s", "custom": { "fillOpacity": 10, "lineWidth": 2 } } }
        },
        {
          "id": 11,
          "title": "Spawn Duration",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 15 },
          "datasource": { "type": "prometheus" },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(spawn_duration_seconds_bucket{namespace=~\"$namespace\"}[5m])) by (le))",
              "legendFormat": "p50"
            },
            {
              "expr": "histogram_quantile(0.90, sum(rate(spawn_duration_seconds_bucket{namespace=~\"$namespace\"}[5m])) by (le))",
              "legendFormat": "p90"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(spawn_duration_seconds_bucket{namespace=~\"$namespace\"}[5m])) by (le))",
              "legendFormat": "p99"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "s", "custom": { "fillOpacity": 10, "lineWidth": 2 } } }
        },
        {
          "id": 12,
          "title": "",
          "type": "row",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 23 },
          "panels": []
        },
        {
          "id": 13,
          "title": "Token Consumption Rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 24 },
          "datasource": { "type": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(tokens_consumed_total{namespace=~\"$namespace\", type=\"input\"}[5m]))",
              "legendFormat": "input"
            },
            {
              "expr": "sum(rate(tokens_consumed_total{namespace=~\"$namespace\", type=\"output\"}[5m]))",
              "legendFormat": "output"
            },
            {
              "expr": "sum(rate(tokens_consumed_total{namespace=~\"$namespace\", type=\"cache_read\"}[5m]))",
              "legendFormat": "cache read"
            }
          ],
