          "type": "stat",
          "gridPos": { "h": 5, "w": 5, "x": 5, "y": 0 },
          "datasource": { "type": "prometheus" },
          "targets": [{ "expr": "sum(yt_mcp_jobs_total{status=\"completed\"}) / sum(yt_mcp_jobs_total) or vector(1)" }],
          "options": { "colorMode": "background", "graphMode": "none", "textMode": "value" },
          "fieldConfig": { "defaults": { "unit": "percentunit", "decimals": 1, "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "value": null, "color": "red" }, { "value": 0.8, "color": "yellow" }, { "value": 0.95, "color": "green" }] } } }
