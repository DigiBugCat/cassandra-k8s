apiVersion: v1
kind: ConfigMap
metadata:
  name: cassandra-custom-dashboards
  labels:
    grafana_dashboard: "1"
data:
  home.json: |
    {
      "uid": "cassandra-home",
      "title": "Cassandra Platform",
      "tags": ["cassandra"],
      "timezone": "browser",
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "templating": { "list": [] },
      "links": [
        {
          "title": "Dashboards",
          "type": "dashboards",
          "tags": [],
          "icon": "external link",
          "asDropdown": true,
          "includeVars": false,
          "keepTime": true
        }
      ],
      "panels": [
        {
          "id": 100,
          "type": "text",
          "title": "",
          "gridPos": { "h": 2, "w": 24, "x": 0, "y": 0 },
          "options": {
            "mode": "markdown",
            "content": "# Cassandra Platform\nCluster health, agent sessions, and resource utilization at a glance."
          },
          "transparent": true
        },
        {
          "id": 1,
          "title": "Cluster Nodes",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 2 },
          "datasource": { "type": "prometheus" },
          "targets": [{ "expr": "count(kube_node_info)" }],
          "options": { "colorMode": "background", "graphMode": "none", "textMode": "value" },
          "fieldConfig": { "defaults": { "color": { "mode": "fixed", "fixedColor": "blue" } } }
        },
        {
          "id": 2,
          "title": "Running Pods",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 4, "y": 2 },
          "datasource": { "type": "prometheus" },
          "targets": [{ "expr": "count(kube_pod_status_phase{phase=\"Running\"} == 1)" }],
          "options": { "colorMode": "background", "graphMode": "none", "textMode": "value" },
          "fieldConfig": { "defaults": { "color": { "mode": "fixed", "fixedColor": "green" } } }
        },
        {
          "id": 3,
          "title": "Failed Pods",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 8, "y": 2 },
          "datasource": { "type": "prometheus" },
          "targets": [{ "expr": "count(kube_pod_status_phase{phase=\"Failed\"} == 1) or vector(0)" }],
          "options": { "colorMode": "background", "graphMode": "none", "textMode": "value" },
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "value": null, "color": "green" }, { "value": 1, "color": "red" }] } } }
        },
        {
          "id": 4,
          "title": "Active Sessions",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 12, "y": 2 },
          "datasource": { "type": "prometheus" },
          "targets": [{ "expr": "sum(sessions_active) or vector(0)" }],
          "options": { "colorMode": "background", "graphMode": "area", "textMode": "value" },
          "fieldConfig": { "defaults": { "color": { "mode": "fixed", "fixedColor": "purple" } } }
        },
        {
          "id": 5,
          "title": "Total Sessions (all time)",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 16, "y": 2 },
          "datasource": { "type": "prometheus" },
          "targets": [{ "expr": "sum(sessions_created_total) or vector(0)" }],
          "options": { "colorMode": "background", "graphMode": "area", "textMode": "value" },
          "fieldConfig": { "defaults": { "color": { "mode": "fixed", "fixedColor": "super-light-purple" } } }
        },
        {
          "id": 6,
          "title": "Cluster Uptime",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 20, "y": 2 },
          "datasource": { "type": "prometheus" },
          "targets": [{ "expr": "min(time() - node_boot_time_seconds)" }],
          "options": { "colorMode": "background", "graphMode": "none", "textMode": "value" },
          "fieldConfig": { "defaults": { "unit": "dtdurations", "color": { "mode": "fixed", "fixedColor": "text" } } }
        },
        {
          "id": 10,
          "title": "Cluster CPU Usage",
          "type": "gauge",
          "gridPos": { "h": 6, "w": 6, "x": 0, "y": 6 },
          "datasource": { "type": "prometheus" },
          "targets": [{ "expr": "1 - avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m]))" }],
          "fieldConfig": { "defaults": { "unit": "percentunit", "min": 0, "max": 1, "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "value": null, "color": "green" }, { "value": 0.7, "color": "yellow" }, { "value": 0.9, "color": "red" }] } } }
        },
        {
          "id": 11,
          "title": "Cluster Memory Usage",
          "type": "gauge",
          "gridPos": { "h": 6, "w": 6, "x": 6, "y": 6 },
          "datasource": { "type": "prometheus" },
          "targets": [{ "expr": "1 - sum(node_memory_MemAvailable_bytes) / sum(node_memory_MemTotal_bytes)" }],
          "fieldConfig": { "defaults": { "unit": "percentunit", "min": 0, "max": 1, "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "value": null, "color": "green" }, { "value": 0.7, "color": "yellow" }, { "value": 0.9, "color": "red" }] } } }
        },
        {
          "id": 12,
          "title": "Cluster Disk Usage",
          "type": "gauge",
          "gridPos": { "h": 6, "w": 6, "x": 12, "y": 6 },
          "datasource": { "type": "prometheus" },
          "targets": [{ "expr": "1 - sum(node_filesystem_avail_bytes{mountpoint=\"/\",fstype!=\"tmpfs\"}) / sum(node_filesystem_size_bytes{mountpoint=\"/\",fstype!=\"tmpfs\"})" }],
          "fieldConfig": { "defaults": { "unit": "percentunit", "min": 0, "max": 1, "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "value": null, "color": "green" }, { "value": 0.7, "color": "yellow" }, { "value": 0.9, "color": "red" }] } } }
        },
        {
          "id": 13,
          "title": "Network I/O",
          "type": "stat",
          "gridPos": { "h": 6, "w": 6, "x": 18, "y": 6 },
          "datasource": { "type": "prometheus" },
          "targets": [
            { "expr": "sum(rate(node_network_receive_bytes_total{device!~\"lo|veth.*|cali.*|flannel.*\"}[5m]))", "legendFormat": "Receive" },
            { "expr": "sum(rate(node_network_transmit_bytes_total{device!~\"lo|veth.*|cali.*|flannel.*\"}[5m]))", "legendFormat": "Transmit" }
          ],
          "options": { "colorMode": "background", "graphMode": "area", "textMode": "value_and_name" },
          "fieldConfig": { "defaults": { "unit": "Bps", "color": { "mode": "fixed", "fixedColor": "text" } } }
        },
        {
          "id": 20,
          "title": "CPU Usage by Node",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
          "datasource": { "type": "prometheus" },
          "targets": [{ "expr": "(1 - avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) by (instance)) * on(instance) group_left(nodename) node_uname_info", "legendFormat": "{{ nodename }}" }],
          "fieldConfig": { "defaults": { "unit": "percentunit", "min": 0, "max": 1, "custom": { "fillOpacity": 15, "lineWidth": 2 } } }
        },
        {
          "id": 21,
          "title": "Memory Usage by Node",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
          "datasource": { "type": "prometheus" },
          "targets": [{ "expr": "(1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * on(instance) group_left(nodename) node_uname_info", "legendFormat": "{{ nodename }}" }],
          "fieldConfig": { "defaults": { "unit": "percentunit", "min": 0, "max": 1, "custom": { "fillOpacity": 15, "lineWidth": 2 } } }
        },
        {
          "id": 30,
          "title": "Pods by Namespace",
          "type": "piechart",
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 20 },
          "datasource": { "type": "prometheus" },
          "targets": [{ "expr": "count(kube_pod_status_phase{phase=\"Running\"} == 1) by (namespace)", "legendFormat": "{{ namespace }}" }],
          "options": { "legend": { "placement": "right", "displayMode": "table", "values": ["value"] }, "pieType": "donut" }
        },
        {
          "id": 31,
          "title": "Pod Restarts (last 1h)",
          "type": "table",
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 20 },
          "datasource": { "type": "prometheus" },
          "targets": [{ "expr": "topk(10, increase(kube_pod_container_status_restarts_total[1h]) > 0)", "format": "table", "instant": true }],
          "transformations": [
            { "id": "organize", "options": { "excludeByName": { "Time": true, "Value": false, "__name__": true, "container": false, "endpoint": true, "instance": true, "job": true, "service": true, "uid": true }, "renameByName": { "Value": "Restarts", "namespace": "Namespace", "pod": "Pod", "container": "Container" } } }
          ],
          "fieldConfig": { "defaults": { "custom": { "align": "left" } }, "overrides": [{ "matcher": { "id": "byName", "options": "Restarts" }, "properties": [{ "id": "custom.width", "value": 80 }, { "id": "color", "value": { "mode": "thresholds" } }, { "id": "thresholds", "value": { "steps": [{ "value": null, "color": "yellow" }, { "value": 3, "color": "red" }] } }, { "id": "custom.cellOptions", "value": { "type": "color-background" } }] }] }
        },
        {
          "id": 32,
          "title": "Agent Cost Rate (USD/min)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 20 },
          "datasource": { "type": "prometheus" },
          "targets": [{ "expr": "sum(rate(cost_usd_total[5m])) by (model) * 60", "legendFormat": "{{ model }}" }],
          "fieldConfig": { "defaults": { "unit": "currencyUSD", "decimals": 4, "custom": { "fillOpacity": 20, "lineWidth": 2, "stacking": { "mode": "normal" } } } }
        },
        {
          "id": 40,
          "title": "Token Consumption",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 12, "x": 0, "y": 28 },
          "datasource": { "type": "prometheus" },
          "targets": [
            { "expr": "sum(rate(tokens_consumed_total{type=\"input\"}[5m]))", "legendFormat": "input" },
            { "expr": "sum(rate(tokens_consumed_total{type=\"output\"}[5m]))", "legendFormat": "output" },
            { "expr": "sum(rate(tokens_consumed_total{type=\"cache_read\"}[5m]))", "legendFormat": "cache read" }
          ],
          "fieldConfig": { "defaults": { "unit": "short", "custom": { "fillOpacity": 15, "lineWidth": 2, "stacking": { "mode": "normal" } } } }
        },
        {
          "id": 41,
          "title": "Disk I/O by Node",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 12, "x": 12, "y": 28 },
          "datasource": { "type": "prometheus" },
          "targets": [
            { "expr": "sum(rate(node_disk_read_bytes_total[5m])) by (instance) * on(instance) group_left(nodename) node_uname_info", "legendFormat": "read {{ nodename }}" },
            { "expr": "sum(rate(node_disk_written_bytes_total[5m])) by (instance) * on(instance) group_left(nodename) node_uname_info", "legendFormat": "write {{ nodename }}" }
          ],
          "fieldConfig": { "defaults": { "unit": "Bps", "custom": { "fillOpacity": 10, "lineWidth": 2 } } }
        }
      ],
      "schemaVersion": 39
    }
  orchestrator.json: |
    {
      "uid": "orchestrator-overview",
      "title": "Orchestrator Overview",
      "tags": [
        "cassandra"
      ],
      "timezone": "browser",
      "refresh": "30s",
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "templating": {
        "list": [
          {
            "name": "namespace",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": ""
            },
            "query": "label_values(api_requests_total, namespace)",
            "current": {
              "text": "All",
              "value": "$__all"
            },
            "includeAll": true,
            "multi": false,
            "refresh": 2
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "API Request Rate",
          "type": "timeseries",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 0
          },
          "datasource": {
            "type": "prometheus"
          },
          "targets": [
            {
              "expr": "sum(rate(api_requests_total{namespace=~\"$namespace\"}[5m])) by (path, method)",
              "legendFormat": "{{method}} {{path}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": {
                "fillOpacity": 10,
                "lineWidth": 2
              }
            }
          }
        },
        {
          "id": 2,
          "title": "Error Rate (non-2xx)",
          "type": "timeseries",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 0
          },
          "datasource": {
            "type": "prometheus"
          },
          "targets": [
            {
              "expr": "sum(rate(api_requests_total{namespace=~\"$namespace\", status!~\"2..\"}[5m])) by (path, status)",
              "legendFormat": "{{status}} {{path}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": {
                "fillOpacity": 10,
                "lineWidth": 2
              },
              "color": {
                "mode": "palette-classic"
              }
            }
          }
        },
        {
          "id": 3,
          "title": "Request Latency p50 / p90 / p99",
          "type": "timeseries",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 8
          },
          "datasource": {
            "type": "prometheus"
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(api_request_duration_seconds_bucket{namespace=~\"$namespace\"}[5m])) by (le))",
              "legendFormat": "p50"
            },
            {
              "expr": "histogram_quantile(0.90, sum(rate(api_request_duration_seconds_bucket{namespace=~\"$namespace\"}[5m])) by (le))",
              "legendFormat": "p90"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(api_request_duration_seconds_bucket{namespace=~\"$namespace\"}[5m])) by (le))",
              "legendFormat": "p99"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": {
                "fillOpacity": 5,
                "lineWidth": 2
              }
            }
          }
        },
        {
          "id": 4,
          "title": "Sessions Created",
          "type": "timeseries",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 8
          },
          "datasource": {
            "type": "prometheus"
          },
          "targets": [
            {
              "expr": "sum(rate(sessions_created_total{namespace=~\"$namespace\"}[5m])) by (namespace)",
              "legendFormat": "{{namespace}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": {
                "fillOpacity": 10,
                "lineWidth": 2
              }
            }
          }
        },
        {
          "id": 5,
          "title": "Total Requests by Status",
          "type": "stat",
          "gridPos": {
            "h": 4,
            "w": 24,
            "x": 0,
            "y": 16
          },
          "datasource": {
            "type": "prometheus"
          },
          "targets": [
            {
              "expr": "sum(api_requests_total{namespace=~\"$namespace\"}) by (status)",
              "legendFormat": "HTTP {{status}}"
            }
          ],
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "value_and_name"
          }
        },
        {
          "id": 6,
          "title": "Requests by Path",
          "type": "piechart",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 20
          },
          "datasource": {
            "type": "prometheus"
          },
          "targets": [
            {
              "expr": "sum(api_requests_total{namespace=~\"$namespace\"}) by (path)",
              "legendFormat": "{{path}}"
            }
          ]
        },
        {
          "id": 7,
          "title": "Active Connections (Traefik)",
          "type": "timeseries",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 20
          },
          "datasource": {
            "type": "prometheus"
          },
          "targets": [
            {
              "expr": "sum(traefik_open_connections) by (entrypoint)",
              "legendFormat": "{{entrypoint}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "fillOpacity": 15,
                "lineWidth": 2
              }
            }
          }
        },
        {
          "id": 8,
          "title": "Warm Pool Hit / Miss Rate",
          "type": "timeseries",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 28
          },
          "datasource": {
            "type": "prometheus"
          },
          "targets": [
            {
              "expr": "rate(warm_pool_hits_total{namespace=~\"$namespace\"}[5m])",
              "legendFormat": "hits"
            },
            {
              "expr": "rate(warm_pool_misses_total{namespace=~\"$namespace\"}[5m])",
              "legendFormat": "misses (cold spawn)"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": {
                "fillOpacity": 15,
                "lineWidth": 2
              }
            }
          }
        },
        {
          "id": 9,
          "title": "Token Pool Usage",
          "type": "timeseries",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 28
          },
          "datasource": {
            "type": "prometheus"
          },
          "targets": [
            {
              "expr": "token_pool_usage{namespace=~\"$namespace\"}",
              "legendFormat": "token #{{token_index}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "fillOpacity": 15,
                "lineWidth": 2,
                "stacking": {
                  "mode": "normal"
                }
              }
            }
          }
        }
      ],
      "schemaVersion": 39
    }
  sessions.json: |
    {
      "uid": "agent-sessions",
      "title": "Agent Sessions",
      "tags": [
        "cassandra"
      ],
      "timezone": "browser",
      "refresh": "30s",
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "templating": {
        "list": [
          {
            "name": "namespace",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": ""
            },
            "query": "label_values(sessions_created_total, namespace)",
            "current": {
              "text": "All",
              "value": "$__all"
            },
            "includeAll": true,
            "multi": false,
            "refresh": 2
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Active Sessions",
          "type": "stat",
          "gridPos": {
            "h": 5,
            "w": 5,
            "x": 0,
            "y": 0
          },
          "datasource": {
            "type": "prometheus"
          },
          "targets": [
            {
              "expr": "sum(sessions_active{namespace=~\"$namespace\"}) or vector(0)"
            }
          ],
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "textMode": "value"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "fixed",
                "fixedColor": "green"
              },
              "thresholds": {
                "steps": [
                  {
                    "value": null,
                    "color": "green"
                  },
                  {
                    "value": 5,
                    "color": "yellow"
                  },
                  {
                    "value": 10,
                    "color": "red"
                  }
                ]
              }
            }
          }
        },
        {
          "id": 2,
          "title": "Total Sessions",
          "type": "stat",
          "gridPos": {
            "h": 5,
            "w": 5,
            "x": 5,
            "y": 0
          },
          "datasource": {
            "type": "prometheus"
          },
          "targets": [
            {
              "expr": "sum(sessions_created_total{namespace=~\"$namespace\"}) or vector(0)"
            }
          ],
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "textMode": "value"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "fixed",
                "fixedColor": "blue"
              },
              "thresholds": {
                "steps": [
                  {
                    "value": null,
                    "color": "blue"
                  }
                ]
              }
            }
          }
        },
        {
          "id": 3,
          "title": "Warm Pool Hit Rate",
          "type": "stat",
          "gridPos": {
            "h": 5,
            "w": 5,
            "x": 10,
            "y": 0
          },
          "datasource": {
            "type": "prometheus"
          },
          "targets": [
            {
              "expr": "sum(warm_pool_hits_total{namespace=~\"$namespace\"}) / (sum(warm_pool_hits_total{namespace=~\"$namespace\"}) + sum(warm_pool_misses_total{namespace=~\"$namespace\"}))"
            }
          ],
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "value"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "steps": [
                  {
                    "value": null,
                    "color": "red"
                  },
                  {
                    "value": 0.5,
                    "color": "yellow"
                  },
                  {
                    "value": 0.8,
                    "color": "green"
                  }
                ]
              }
            }
          }
        },
        {
          "id": 4,
          "title": "Total Cost (USD)",
          "type": "stat",
          "gridPos": {
            "h": 5,
            "w": 5,
            "x": 15,
            "y": 0
          },
          "datasource": {
            "type": "prometheus"
          },
          "targets": [
            {
              "expr": "sum(cost_usd_total{namespace=~\"$namespace\"}) or vector(0)"
            }
          ],
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "textMode": "value"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "currencyUSD",
              "decimals": 2,
              "color": {
                "mode": "fixed",
                "fixedColor": "orange"
              },
              "thresholds": {
                "steps": [
                  {
                    "value": null,
                    "color": "orange"
                  }
                ]
              }
            }
          }
        },
        {
          "id": 5,
          "title": "Total Tokens",
          "type": "stat",
          "gridPos": {
            "h": 5,
