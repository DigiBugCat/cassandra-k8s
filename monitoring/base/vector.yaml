apiVersion: v1
kind: ConfigMap
metadata:
  name: vector-config
data:
  vector.yaml: |
    sources:
      kubernetes_logs:
        type: kubernetes_logs

    transforms:
      parse_json:
        type: remap
        inputs: [kubernetes_logs]
        source: |
          parsed, err = parse_json(.message)
          if err == null {
            ., err = merge(., parsed)
          }
          ._namespace = .kubernetes.pod_namespace
          ._pod = .kubernetes.pod_name
          ._container = .kubernetes.container_name
          ._node = .kubernetes.pod_node_name

    sinks:
      victoria_logs:
        type: http
        inputs: [parse_json]
        uri: "http://victoria-logs.monitoring.svc:9428/insert/jsonline?_stream_fields=_namespace,_pod,_container&_msg_field=message&_time_field=ts"
        encoding:
          codec: json
        batch:
          max_bytes: 1048576
          timeout_secs: 1
        request:
          concurrency: 2
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vector
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vector
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces", "nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vector
subjects:
  - kind: ServiceAccount
    name: vector
    namespace: monitoring
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: vector
spec:
  selector:
    matchLabels:
      app: vector
  template:
    metadata:
      labels:
        app: vector
    spec:
      serviceAccountName: vector
      containers:
        - name: vector
          image: timberio/vector:0.53.0-alpine
          args: ["--config", "/etc/vector/vector.yaml"]
          env:
            - name: VECTOR_SELF_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: config
              mountPath: /etc/vector
            - name: var-log
              mountPath: /var/log
              readOnly: true
            - name: var-lib-docker
              mountPath: /var/lib/docker
              readOnly: true
            - name: data
              mountPath: /var/lib/vector
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
      volumes:
        - name: config
          configMap:
            name: vector-config
        - name: var-log
          hostPath:
            path: /var/log
        - name: var-lib-docker
          hostPath:
            path: /var/lib/docker
        - name: data
          hostPath:
            path: /var/lib/vector
