apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: victoria-logs-data
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: victoria-logs
spec:
  serviceName: victoria-logs
  replicas: 1
  selector:
    matchLabels:
      app: victoria-logs
  template:
    metadata:
      labels:
        app: victoria-logs
    spec:
      containers:
        - name: victoria-logs
          image: victoriametrics/victoria-logs:v1.47.0-victorialogs
          args:
            - -storageDataPath=/data
            - -retentionPeriod=30d
          ports:
            - name: http
              containerPort: 9428
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: victoria-logs-data
---
apiVersion: v1
kind: Service
metadata:
  name: victoria-logs
spec:
  selector:
    app: victoria-logs
  ports:
    - name: http
      port: 9428
      targetPort: 9428
