# ArgoCD Image Updater — watches GHCR for new image tags and updates Applications.
# Install via: kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj-labs/argocd-image-updater/stable/manifests/install.yaml
#
# This ConfigMap configures GHCR as a registry.
# For private GHCR repos, create a secret with a GitHub PAT:
#   kubectl -n argocd create secret generic ghcr-credentials \
#     --from-literal=username=<github-username> \
#     --from-literal=password=<github-pat-with-read:packages>
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-image-updater-config
  namespace: argocd
data:
  registries.conf: |
    registries:
      - name: GitHub Container Registry
        api_url: https://ghcr.io
        prefix: ghcr.io
        ping: yes
        credentials: secret:argocd/ghcr-credentials#username:password
        defaultns: digibugcat
      - name: Local Registry
        api_url: http://172.20.0.161:30500
        prefix: 172.20.0.161:30500
        ping: yes
        insecure: yes
