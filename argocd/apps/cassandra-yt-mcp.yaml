apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cassandra-yt-mcp
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/DigiBugCat/cassandra-k8s.git
    targetRevision: main
    path: apps/cassandra-yt-mcp
    helm:
      releaseName: cassandra-yt-mcp
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: cassandra-yt-mcp
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
