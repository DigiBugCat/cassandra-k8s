apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cassandra-yt-mcp
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: >-
      coordinator=172.20.0.161:30500/cassandra-yt-mcp/coordinator,
      worker=172.20.0.161:30500/cassandra-yt-mcp/backend
    argocd-image-updater.argoproj.io/coordinator.update-strategy: newest-build
    argocd-image-updater.argoproj.io/coordinator.helm.image-name: image.repository
    argocd-image-updater.argoproj.io/coordinator.helm.image-tag: image.tag
    argocd-image-updater.argoproj.io/worker.update-strategy: newest-build
    argocd-image-updater.argoproj.io/worker.helm.image-name: workerImage.repository
    argocd-image-updater.argoproj.io/worker.helm.image-tag: workerImage.tag
    argocd-image-updater.argoproj.io/write-back-method: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/DigiBugCat/cassandra-k8s.git
    targetRevision: main
    path: apps/cassandra-yt-mcp
    helm:
      releaseName: cassandra-yt-mcp
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: cassandra-yt-mcp
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
