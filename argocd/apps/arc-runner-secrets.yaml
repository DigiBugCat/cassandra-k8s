# ARC Runner Secrets — SealedSecret for GitHub App credentials.
# Must sync before the runner scale set so the secret exists.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arc-runner-secrets
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/DigiBugCat/cassandra-k8s.git
    targetRevision: main
    path: apps/arc-runners
    helm:
      releaseName: arc-runner-secrets
      valueFiles:
        - values.yaml
        - values-production.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: arc-runners
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
