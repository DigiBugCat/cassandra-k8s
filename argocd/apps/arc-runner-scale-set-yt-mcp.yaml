# ARC Runner Scale Set for cassandra-yt-mcp — ephemeral self-hosted GitHub Actions runners.
# Uses upstream OCI chart with DinD for docker build support.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arc-runner-scale-set-yt-mcp
  namespace: argocd
spec:
  project: default
  source:
    chart: gha-runner-scale-set
    repoURL: ghcr.io/actions/actions-runner-controller-charts
    targetRevision: 0.10.1
    helm:
      releaseName: arc-runner-set-yt-mcp
      valuesObject:
        controllerServiceAccount:
          namespace: arc-systems
          name: arc-gha-rs-controller
        githubConfigUrl: "https://github.com/DigiBugCat/cassandra-yt-mcp"
        githubConfigSecret: github-secret
        runnerScaleSetName: "arc-runner-yt-mcp"
        minRunners: 0
        maxRunners: 2
        containerMode:
          type: "dind"
  destination:
    server: https://kubernetes.default.svc
    namespace: arc-runners
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
