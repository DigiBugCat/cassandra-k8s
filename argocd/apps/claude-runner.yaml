apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: claude-runner
  namespace: argocd
  annotations:
    # ArgoCD Image Updater: watch GHCR for new orchestrator + runner images
    argocd-image-updater.argoproj.io/image-list: >-
      orchestrator=ghcr.io/digibugcat/claude-agent-runner/orchestrator,
      runner=ghcr.io/digibugcat/claude-agent-runner/runner
    argocd-image-updater.argoproj.io/orchestrator.update-strategy: latest
    argocd-image-updater.argoproj.io/runner.update-strategy: latest
    # Write back via Helm value overrides (no commit back to repo)
    argocd-image-updater.argoproj.io/write-back-method: argocd
    argocd-image-updater.argoproj.io/orchestrator.helm.image-name: image.orchestrator
    argocd-image-updater.argoproj.io/orchestrator.helm.image-tag: image.tag
    argocd-image-updater.argoproj.io/runner.helm.image-name: image.runner
    argocd-image-updater.argoproj.io/runner.helm.image-tag: image.tag
spec:
  project: default
  source:
    repoURL: https://github.com/DigiBugCat/cassandra-k8s.git
    targetRevision: main
    path: apps/claude-runner
    helm:
      releaseName: claude-runner
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: claude-runner
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
