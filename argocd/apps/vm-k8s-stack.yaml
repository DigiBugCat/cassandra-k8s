apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vm-k8s-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://victoriametrics.github.io/helm-charts/
    chart: victoria-metrics-k8s-stack
    targetRevision: 0.72.4
    helm:
      releaseName: vm-k8s-stack
      valuesObject:
        # ── VM Operator ──
        victoria-metrics-operator:
          enabled: true
          crds:
            plain: true

        # ── VMSingle (metrics storage) ──
        vmsingle:
          spec:
            retentionPeriod: "30d"
            storage:
              resources:
                requests:
                  storage: 5Gi
            resources:
              requests:
                cpu: "100m"
                memory: "256Mi"
              limits:
                cpu: "500m"
                memory: "512Mi"

        # ── VMAgent (scraping) ──
        vmagent:
          enabled: true
          spec:
            resources:
              requests:
                cpu: "50m"
                memory: "128Mi"
              limits:
                cpu: "200m"
                memory: "256Mi"

        # ── VMAlert (alerting rules) ──
        vmalert:
          enabled: true

        # ── node-exporter (node metrics) ──
        prometheus-node-exporter:
          enabled: true
          # Disable hostRootFsMount — fails on WSL2 nodes (shared mount not supported)
          hostRootFsMount:
            enabled: false
          tolerations:
            - key: dedicated
              operator: Equal
              value: gpu-node
              effect: NoSchedule

        # ── kube-state-metrics (k8s object metrics) ──
        kube-state-metrics:
          enabled: true

        # ── Built-in dashboards + rules ──
        defaultDashboards:
          enabled: true
        defaultRules:
          create: true

        # ── Grafana ──
        grafana:
          enabled: true
          fullnameOverride: grafana
          adminPassword: admin
          service:
            port: 3000
          plugins:
            - victoriametrics-logs-datasource
          sidecar:
            datasources:
              enabled: true
            dashboards:
              enabled: true
              label: grafana_dashboard
              labelValue: "1"
              folder: /var/lib/grafana/dashboards
              defaultFolderName: default
          additionalDataSources:
            - name: VictoriaLogs
              type: victoriametrics-logs-datasource
              access: proxy
              url: http://victoria-logs:9428
              editable: true
          assertNoLeakedSecrets: false
          grafana.ini:
            server:
              root_url: "%(protocol)s://%(domain)s:%(http_port)s/"
            auth.anonymous:
              enabled: true
              org_role: Viewer
            dashboards:
              default_home_dashboard_path: /var/lib/grafana/dashboards/default/home.json
            plugins:
              allow_loading_unsigned_plugins: victoriametrics-logs-datasource
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

        # ── Extra objects: VictoriaLogs + Vector + custom dashboards ──
        extraObjects:
          # --- VictoriaLogs PVC ---
          - apiVersion: v1
            kind: PersistentVolumeClaim
            metadata:
              name: victoria-logs-data
              namespace: monitoring
            spec:
              accessModes: [ReadWriteOnce]
              resources:
                requests:
                  storage: 10Gi

          # --- VictoriaLogs StatefulSet ---
          - apiVersion: apps/v1
            kind: StatefulSet
            metadata:
              name: victoria-logs
              namespace: monitoring
            spec:
              serviceName: victoria-logs
              replicas: 1
              selector:
                matchLabels:
                  app: victoria-logs
              template:
                metadata:
                  labels:
                    app: victoria-logs
                spec:
                  containers:
                    - name: victoria-logs
                      image: victoriametrics/victoria-logs:v1.47.0
                      args:
                        - -storageDataPath=/data
                        - -retentionPeriod=30d
                      ports:
                        - name: http
                          containerPort: 9428
                      volumeMounts:
                        - name: data
                          mountPath: /data
                      resources:
                        requests:
                          cpu: "100m"
                          memory: "256Mi"
                        limits:
                          cpu: "500m"
                          memory: "512Mi"
                  volumes:
                    - name: data
                      persistentVolumeClaim:
                        claimName: victoria-logs-data

          # --- VictoriaLogs Service ---
          - apiVersion: v1
            kind: Service
            metadata:
              name: victoria-logs
              namespace: monitoring
            spec:
              selector:
                app: victoria-logs
              ports:
                - name: http
                  port: 9428
                  targetPort: 9428

          # --- Vector ConfigMap ---
          - apiVersion: v1
            kind: ConfigMap
            metadata:
              name: vector-config
              namespace: monitoring
            data:
              vector.yaml: |
                sources:
                  kubernetes_logs:
                    type: kubernetes_logs

                transforms:
                  parse_json:
                    type: remap
                    inputs: [kubernetes_logs]
                    source: |
                      parsed, err = parse_json(.message)
                      if err == null {
                        ., err = merge(., parsed)
                      }
                      ._namespace = .kubernetes.pod_namespace
                      ._pod = .kubernetes.pod_name
                      ._container = .kubernetes.container_name
                      ._node = .kubernetes.pod_node_name

                sinks:
                  victoria_logs:
                    type: http
                    inputs: [parse_json]
                    uri: "http://victoria-logs.monitoring.svc:9428/insert/jsonline?_stream_fields=_namespace,_pod,_container&_msg_field=message&_time_field=ts"
                    encoding:
                      codec: json
                    batch:
                      max_bytes: 1048576
                      timeout_secs: 1
                    request:
                      concurrency: 2

          # --- Vector ServiceAccount ---
          - apiVersion: v1
            kind: ServiceAccount
            metadata:
              name: vector
              namespace: monitoring

          # --- Vector ClusterRole ---
          - apiVersion: rbac.authorization.k8s.io/v1
            kind: ClusterRole
            metadata:
              name: vector
            rules:
              - apiGroups: [""]
                resources: ["pods", "namespaces", "nodes"]
                verbs: ["get", "list", "watch"]

          # --- Vector ClusterRoleBinding ---
          - apiVersion: rbac.authorization.k8s.io/v1
            kind: ClusterRoleBinding
            metadata:
              name: vector
            roleRef:
              apiGroup: rbac.authorization.k8s.io
              kind: ClusterRole
              name: vector
            subjects:
              - kind: ServiceAccount
                name: vector
                namespace: monitoring

          # --- Vector DaemonSet ---
          - apiVersion: apps/v1
            kind: DaemonSet
            metadata:
              name: vector
              namespace: monitoring
            spec:
              selector:
                matchLabels:
                  app: vector
              template:
                metadata:
                  labels:
                    app: vector
                spec:
                  serviceAccountName: vector
                  containers:
                    - name: vector
                      image: timberio/vector:0.53.0-alpine
                      args: ["--config", "/etc/vector/vector.yaml"]
                      env:
                        - name: VECTOR_SELF_NODE_NAME
                          valueFrom:
                            fieldRef:
                              fieldPath: spec.nodeName
                      volumeMounts:
                        - name: config
                          mountPath: /etc/vector
                        - name: var-log
                          mountPath: /var/log
                          readOnly: true
                        - name: var-lib-docker
                          mountPath: /var/lib/docker
                          readOnly: true
                        - name: data
                          mountPath: /var/lib/vector
                      resources:
                        requests:
                          cpu: "50m"
                          memory: "64Mi"
                        limits:
                          cpu: "200m"
                          memory: "256Mi"
                  volumes:
                    - name: config
                      configMap:
                        name: vector-config
                    - name: var-log
                      hostPath:
                        path: /var/log
                    - name: var-lib-docker
                      hostPath:
                        path: /var/lib/docker
                    - name: data
                      hostPath:
                        path: /var/lib/vector


  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
