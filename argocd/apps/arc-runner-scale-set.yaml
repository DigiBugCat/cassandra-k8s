# ARC Runner Scale Set — ephemeral self-hosted GitHub Actions runners.
# Uses upstream OCI chart with DinD for docker build support.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arc-runner-scale-set
  namespace: argocd
spec:
  project: default
  source:
    chart: gha-runner-scale-set
    repoURL: ghcr.io/actions/actions-runner-controller-charts
    targetRevision: 0.13.1
    helm:
      releaseName: arc-runner-set
      valuesObject:
        controllerServiceAccount:
          namespace: arc-systems
          name: arc-gha-rs-controller
        githubConfigUrl: "https://github.com/DigiBugCat/claude-agent-runner"
        githubConfigSecret: github-secret
        runnerScaleSetName: "arc-runner"
        minRunners: 0
        maxRunners: 4
        containerMode:
          type: "dind"
        template:
          spec:
            containers:
              - name: runner
                image: ghcr.io/actions/actions-runner:latest
                command: ["/home/runner/run.sh"]
                resources:
                  requests:
                    cpu: "1"
                    memory: "2Gi"
                  limits:
                    cpu: "4"
                    memory: "8Gi"
  destination:
    server: https://kubernetes.default.svc
    namespace: arc-runners
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
