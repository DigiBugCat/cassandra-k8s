apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: claude-runner-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/DigiBugCat/cassandra-k8s.git
    targetRevision: main
    path: apps/claude-runner
    helm:
      releaseName: claude-runner-dev
      valueFiles:
        - values.yaml
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: claude-runner-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
