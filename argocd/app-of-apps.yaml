# App of Apps — ArgoCD manages this, which manages all other Applications.
# Apply once: kubectl apply -f argocd/app-of-apps.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cassandra-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/DigiBugCat/cassandra-gitops.git
    targetRevision: main
    path: argocd/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
