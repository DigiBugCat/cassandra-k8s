{{- if .Values.worker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cassandra-yt-mcp.fullname" . }}-worker
  labels:
    {{- include "cassandra-yt-mcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ include "cassandra-yt-mcp.fullname" . }}-worker
  template:
    metadata:
      labels:
        app: {{ include "cassandra-yt-mcp.fullname" . }}-worker
      annotations:
        prometheus.io/scrape: "false"
    spec:
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- range . }}
        - name: {{ . | quote }}
        {{- end }}
      {{- end }}
      {{- with .Values.worker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: worker
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.worker.port }}
          env:
            - name: ROLE
              value: "worker"
            - name: HOST
              value: "0.0.0.0"
            - name: WORKER_PORT
              value: {{ .Values.worker.port | quote }}
            - name: ENABLE_LOCAL_TRANSCRIPTION
              value: "true"
            - name: HUGGINGFACE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cassandra-yt-mcp-backend
                  key: HUGGINGFACE_TOKEN
                  optional: true
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          startupProbe:
            httpGet:
              path: /worker/healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 18
          readinessProbe:
            httpGet:
              path: /worker/healthz
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /worker/healthz
              port: http
            periodSeconds: 30
{{- end }}
