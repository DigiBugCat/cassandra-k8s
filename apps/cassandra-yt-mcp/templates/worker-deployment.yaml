{{- if .Values.worker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cassandra-yt-mcp.fullname" . }}-worker
  labels:
    {{- include "cassandra-yt-mcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app: {{ include "cassandra-yt-mcp.fullname" . }}-worker
  template:
    metadata:
      labels:
        app: {{ include "cassandra-yt-mcp.fullname" . }}-worker
      annotations:
        prometheus.io/scrape: "false"
    spec:
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- range . }}
        - name: {{ . | quote }}
        {{- end }}
      {{- end }}
      {{- with .Values.worker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: worker
          image: {{ .Values.workerImage.repository }}:{{ .Values.workerImage.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.worker.port }}
          env:
            - name: WORKER_PORT
              value: {{ .Values.worker.port | quote }}
            - name: RUST_LOG
              value: "info"
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          startupProbe:
            httpGet:
              path: /worker/healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 24
          readinessProbe:
            httpGet:
              path: /worker/healthz
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /worker/healthz
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 40
{{- end }}
