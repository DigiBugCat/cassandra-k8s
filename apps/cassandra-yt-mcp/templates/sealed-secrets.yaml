{{- if or .Values.sealedSecrets.backend.ASSEMBLYAI_API_KEY .Values.sealedSecrets.backend.HUGGINGFACE_TOKEN .Values.sealedSecrets.backend.BACKEND_API_TOKEN }}
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: cassandra-yt-mcp-backend
spec:
  encryptedData:
    {{- if .Values.sealedSecrets.backend.ASSEMBLYAI_API_KEY }}
    ASSEMBLYAI_API_KEY: {{ .Values.sealedSecrets.backend.ASSEMBLYAI_API_KEY | quote }}
    {{- end }}
    {{- if .Values.sealedSecrets.backend.HUGGINGFACE_TOKEN }}
    HUGGINGFACE_TOKEN: {{ .Values.sealedSecrets.backend.HUGGINGFACE_TOKEN | quote }}
    {{- end }}
    {{- if .Values.sealedSecrets.backend.BACKEND_API_TOKEN }}
    BACKEND_API_TOKEN: {{ .Values.sealedSecrets.backend.BACKEND_API_TOKEN | quote }}
    {{- end }}
  template:
    metadata:
      name: cassandra-yt-mcp-backend
    type: Opaque
{{- end }}
---
{{- if and .Values.cloudflaredTunnel.enabled .Values.sealedSecrets.cloudflaredTunnel.token }}
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: cloudflare-tunnel
spec:
  encryptedData:
    token: {{ .Values.sealedSecrets.cloudflaredTunnel.token | quote }}
  template:
    metadata:
      name: cloudflare-tunnel
    type: Opaque
{{- end }}
