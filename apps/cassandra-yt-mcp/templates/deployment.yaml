apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cassandra-yt-mcp.fullname" . }}
  labels:
    {{- include "cassandra-yt-mcp.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "cassandra-yt-mcp.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cassandra-yt-mcp.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- range . }}
        - name: {{ . | quote }}
        {{- end }}
      {{- end }}
      {{- with .Values.backend.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.backend.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.backend.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: backend
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.backend.port }}
          env:
            - name: HOST
              value: {{ .Values.backend.env.host | quote }}
            - name: PORT
              value: {{ .Values.backend.port | quote }}
            - name: DATA_DIR
              value: /data
            - name: DATABASE_PATH
              value: /data/cassandra_yt_mcp.sqlite3
            - name: POLL_INTERVAL_SECONDS
              value: {{ .Values.backend.env.pollIntervalSeconds | quote }}
            - name: MAX_WORKERS
              value: {{ .Values.backend.env.maxWorkers | quote }}
            - name: ENABLE_LOCAL_TRANSCRIPTION
              value: {{ .Values.backend.env.enableLocalTranscription | quote }}
            - name: ASSEMBLYAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: cassandra-yt-mcp-backend
                  key: ASSEMBLYAI_API_KEY
                  optional: true
            - name: HUGGINGFACE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cassandra-yt-mcp-backend
                  key: HUGGINGFACE_TOKEN
                  optional: true
            - name: BACKEND_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cassandra-yt-mcp-backend
                  key: BACKEND_API_TOKEN
                  optional: true
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 18
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 30
        {{- if .Values.cloudflaredTunnel.enabled }}
        - name: cloudflared
          image: {{ .Values.cloudflaredTunnel.image }}
          args: ["tunnel", "run"]
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflare-tunnel
                  key: token
          resources:
            {{- toYaml .Values.cloudflaredTunnel.resources | nindent 12 }}
        {{- end }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: cassandra-yt-mcp-data
