{{- if .Values.worker.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cassandra-yt-mcp.fullname" . }}-worker
  labels:
    {{- include "cassandra-yt-mcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.worker.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: {{ include "cassandra-yt-mcp.fullname" . }}-worker
{{- end }}
