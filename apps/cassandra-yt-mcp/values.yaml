image:
  repository: 172.20.0.161:30500/cassandra-yt-mcp/coordinator
  tag: latest
  pullPolicy: Always
  pullSecrets: []

workerImage:
  repository: 172.20.0.161:30500/cassandra-yt-mcp/backend-onnx
  tag: latest
  # NeMo fallback: 172.20.0.161:30500/cassandra-yt-mcp/backend

backend:
  replicas: 1
  port: 3000
  role: coordinator
  gpuWorkers: "http://cassandra-yt-mcp-worker:3001"
  tolerations: []
  affinity: {}
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "1Gi"
  env:
    host: "0.0.0.0"
    pollIntervalSeconds: "5"
    maxWorkers: "2"
    enableLocalTranscription: "false"

downloader:
  enabled: true
  port: 3002
  downloadConcurrency: 2
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "4Gi"

worker:
  enabled: true
  replicas: 1
  port: 3001
  tolerations:
    - key: "dedicated"
      operator: "Equal"
      value: "gpu-node"
      effect: "NoSchedule"
    - key: "node.kubernetes.io/unreachable"
      operator: "Exists"
      effect: "NoExecute"
      tolerationSeconds: 60
    - key: "node.kubernetes.io/not-ready"
      operator: "Exists"
      effect: "NoExecute"
      tolerationSeconds: 60
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: role
                operator: In
                values:
                  - gpu-node
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app: cassandra-yt-mcp-worker
          topologyKey: kubernetes.io/hostname
  transcriptionEngine: "onnx"
  resources:
    requests:
      cpu: "1"
      memory: "2Gi"
    limits:
      cpu: "4"
      memory: "8Gi"
      nvidia.com/gpu: 1

persistence:
  size: 50Gi

service:
  type: ClusterIP
  port: 3000

# cloudflared sidecar disabled — yt-mcp-api is routed through the single
# runner tunnel (cloudflared pod in claude-runner namespace).
cloudflaredTunnel:
  enabled: false
