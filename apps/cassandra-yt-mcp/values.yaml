image:
  repository: 172.20.0.161:30500/cassandra-yt-mcp/backend
  tag: "fedf7a8"
  pullPolicy: IfNotPresent
  pullSecrets: []

backend:
  replicas: 1
  port: 3000
  tolerations:
    - key: "dedicated"
      operator: "Equal"
      value: "gpu-node"
      effect: "NoSchedule"
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: role
                operator: In
                values:
                  - gpu-node
  resources:
    requests:
      cpu: "1"
      memory: "4Gi"
    limits:
      cpu: "4"
      memory: "8Gi"
      nvidia.com/gpu: 1
  env:
    host: "0.0.0.0"
    pollIntervalSeconds: "5"
    maxWorkers: "1"
    enableLocalTranscription: "true"

persistence:
  size: 50Gi

service:
  type: ClusterIP
  port: 3000

cloudflaredTunnel:
  enabled: true
  image: cloudflare/cloudflared:2026.2.0
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"
