apiVersion: v1
kind: Namespace
metadata:
  name: buildkitd
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: buildkitd-config
  namespace: buildkitd
data:
  buildkitd.toml: |
    [registry."172.20.0.161:30500"]
      http = true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: buildkitd
  namespace: buildkitd
  labels:
    app: buildkitd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: buildkitd
  template:
    metadata:
      labels:
        app: buildkitd
    spec:
      # Pin to pantainos — close to the local registry and has /scratch for cache
      nodeSelector:
        kubernetes.io/hostname: pantainos
      containers:
        - name: buildkitd
          image: moby/buildkit:v0.21.1
          args:
            - --addr
            - tcp://0.0.0.0:1234
            - --config
            - /etc/buildkit/buildkitd.toml
          ports:
            - containerPort: 1234
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: 1234
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 1234
            initialDelaySeconds: 5
            periodSeconds: 30
          securityContext:
            privileged: true
          volumeMounts:
            - name: buildkitd-config
              mountPath: /etc/buildkit
            - name: cache
              mountPath: /home/user/.local/share/buildkit
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              memory: 4Gi
      volumes:
        - name: buildkitd-config
          configMap:
            name: buildkitd-config
        - name: cache
          hostPath:
            path: /scratch/buildkit-cache
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: buildkitd
  namespace: buildkitd
  labels:
    app: buildkitd
spec:
  ports:
    - port: 1234
      protocol: TCP
  selector:
    app: buildkitd
