apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: claude-runner
  labels:
    app: cloudflared
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      nodeSelector:
        role: control-plane-workloads
      containers:
      - name: cloudflared
        image: cloudflare/cloudflared:2026.2.0
        args: ["tunnel", "run"]
        env:
        - name: TUNNEL_TOKEN
          valueFrom:
            secretKeyRef:
              name: cloudflare-tunnel
              key: token
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
