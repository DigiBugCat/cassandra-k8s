apiVersion: v1
kind: ConfigMap
metadata:
  name: portal-nginx-config
data:
  default.conf: |
    resolver kube-dns.kube-system.svc.cluster.local valid=10s;

    # Grafana — strip /grafana prefix, proxy to monitoring namespace
    location /grafana/ {
      proxy_pass {{ .Values.upstreams.grafana }}/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      # WebSocket support for Grafana Live
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    # ArgoCD — strip /argocd prefix, proxy to argocd namespace
    location /argocd/ {
      proxy_pass {{ .Values.upstreams.argocd }}/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_ssl_verify off;
      # SSE/WebSocket for ArgoCD
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    # Runner API — strip /runner prefix
    location /runner/ {
      proxy_pass {{ .Values.upstreams.runner }}/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Runner WebSocket
    location /runner/ws {
      proxy_pass {{ .Values.upstreams.runnerWs }}/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_read_timeout 86400s;
    }

    # Portal UI — serve static HTML
    location / {
      root /usr/share/nginx/html;
      index index.html;
      try_files $uri $uri/ /index.html;
    }

  nginx.conf: |
    worker_processes auto;
    error_log /var/log/nginx/error.log warn;
    pid /tmp/nginx.pid;

    events {
      worker_connections 256;
    }

    http {
      include /etc/nginx/mime.types;
      default_type application/octet-stream;
      sendfile on;
      keepalive_timeout 65;
      client_max_body_size 10m;

      server {
        listen 80;
        server_name _;
        include /etc/nginx/conf.d/default.conf;
      }
    }
