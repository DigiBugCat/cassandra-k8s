apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal
  labels:
    app: portal
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: portal
  template:
    metadata:
      labels:
        app: portal
    spec:
      containers:
        - name: nginx
          image: {{ .Values.image.nginx }}
          ports:
            - name: http
              containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: portal-html
              mountPath: /usr/share/nginx/html
          resources:
            {{- toYaml .Values.resources.nginx | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 10
        - name: cloudflared
          image: {{ .Values.image.cloudflared }}
          args: ["tunnel", "run"]
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflare-tunnel
                  key: token
          resources:
            {{- toYaml .Values.resources.cloudflared | nindent 12 }}
      volumes:
        - name: nginx-config
          configMap:
            name: portal-nginx-config
        - name: portal-html
          configMap:
            name: portal-html
