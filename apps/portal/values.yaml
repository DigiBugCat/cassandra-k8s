# Cassandra Portal — Helm values

image:
  nginx: nginx:1.27-alpine
  cloudflared: cloudflare/cloudflared:2024.12.2

replicas: 1

resources:
  nginx:
    requests:
      cpu: "50m"
      memory: "32Mi"
    limits:
      cpu: "200m"
      memory: "64Mi"
  cloudflared:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

# Upstream k8s service DNS names
upstreams:
  grafana: "http://grafana.monitoring.svc.cluster.local:3000"
  argocd: "https://argocd-server.argocd.svc.cluster.local:443"
  runner: "http://claude-orchestrator.claude-runner.svc.cluster.local:8080"
  runnerWs: "http://claude-orchestrator.claude-runner.svc.cluster.local:8081"

portalDomain: "portal.REDACTED_DOMAIN"

sealedSecrets:
  cloudflaredTunnel:
    token: ""
