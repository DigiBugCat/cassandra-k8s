apiVersion: v1
kind: Service
metadata:
  name: {{ include "registry.fullname" . }}
  labels:
    {{- include "registry.labels" . | nindent 4 }}
spec:
  type: NodePort
  ports:
    - port: {{ .Values.port }}
      targetPort: http
      nodePort: {{ .Values.nodePort }}
      protocol: TCP
      name: http
  selector:
    {{- include "registry.selectorLabels" . | nindent 4 }}
