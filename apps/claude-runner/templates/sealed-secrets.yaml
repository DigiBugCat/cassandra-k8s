{{- if .Values.sealedSecrets.claudeTokens.CLAUDE_CODE_OAUTH_TOKEN }}
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: claude-tokens
spec:
  encryptedData:
    CLAUDE_CODE_OAUTH_TOKEN: {{ .Values.sealedSecrets.claudeTokens.CLAUDE_CODE_OAUTH_TOKEN | quote }}
  template:
    metadata:
      name: claude-tokens
    type: Opaque
{{- end }}
---
{{- if or .Values.sealedSecrets.gitTokens.GIT_TOKEN .Values.sealedSecrets.gitTokens.GITHUB_TOKEN }}
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: git-tokens
spec:
  encryptedData:
    {{- if .Values.sealedSecrets.gitTokens.GIT_TOKEN }}
    GIT_TOKEN: {{ .Values.sealedSecrets.gitTokens.GIT_TOKEN | quote }}
    {{- end }}
    {{- if .Values.sealedSecrets.gitTokens.GITHUB_TOKEN }}
    GITHUB_TOKEN: {{ .Values.sealedSecrets.gitTokens.GITHUB_TOKEN | quote }}
    {{- end }}
  template:
    metadata:
      name: git-tokens
    type: Opaque
{{- end }}
---
{{- if and .Values.obsidian.enabled (or .Values.sealedSecrets.obsidianAuth.OBSIDIAN_AUTH_TOKEN .Values.sealedSecrets.obsidianAuth.OBSIDIAN_E2EE_PASSWORD) }}
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: obsidian-auth
spec:
  encryptedData:
    {{- if .Values.sealedSecrets.obsidianAuth.OBSIDIAN_AUTH_TOKEN }}
    OBSIDIAN_AUTH_TOKEN: {{ .Values.sealedSecrets.obsidianAuth.OBSIDIAN_AUTH_TOKEN | quote }}
    {{- end }}
    {{- if .Values.sealedSecrets.obsidianAuth.OBSIDIAN_E2EE_PASSWORD }}
    OBSIDIAN_E2EE_PASSWORD: {{ .Values.sealedSecrets.obsidianAuth.OBSIDIAN_E2EE_PASSWORD | quote }}
    {{- end }}
  template:
    metadata:
      name: obsidian-auth
    type: Opaque
{{- end }}
---
{{- if and .Values.tenants.enabled .Values.sealedSecrets.adminKey.ADMIN_API_KEY }}
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: admin-key
spec:
  encryptedData:
    ADMIN_API_KEY: {{ .Values.sealedSecrets.adminKey.ADMIN_API_KEY | quote }}
  template:
    metadata:
      name: admin-key
    type: Opaque
{{- end }}
---
{{- if and .Values.cloudflaredTunnel.enabled .Values.sealedSecrets.cloudflaredTunnel.token }}
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: cloudflare-tunnel
spec:
  encryptedData:
    token: {{ .Values.sealedSecrets.cloudflaredTunnel.token | quote }}
  template:
    metadata:
      name: cloudflare-tunnel
    type: Opaque
{{- end }}
