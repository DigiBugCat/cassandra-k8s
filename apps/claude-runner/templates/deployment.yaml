apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "claude-runner.orchestratorName" . }}
  labels:
    {{- include "claude-runner.orchestratorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.orchestrator.replicas }}
  selector:
    matchLabels:
      {{- include "claude-runner.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "claude-runner.selectorLabels" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: {{ include "claude-runner.orchestratorName" . }}
      containers:
        - name: orchestrator
          image: {{ .Values.image.orchestrator }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
            - name: ws
              containerPort: 8081
          env:
            - name: PORT
              value: "8080"
            - name: WS_PORT
              value: "8081"
            - name: RUNNER_BACKEND
              value: {{ .Values.runner.backend | quote }}
            - name: K8S_NAMESPACE
              value: {{ .Release.Namespace | quote }}
            - name: RUNNER_IMAGE
              value: {{ .Values.image.runner }}:{{ .Values.image.tag }}
            - name: RUNNER_IMAGE_PULL_POLICY
              value: {{ .Values.image.pullPolicy | quote }}
            - name: ORCHESTRATOR_HOST
              value: {{ include "claude-runner.orchestratorName" . | quote }}
            - name: DB_PATH
              value: "/data/orchestrator.db"
            - name: SESSIONS_VOLUME
              value: "claude-sessions"
            - name: SESSIONS_PATH
              value: "/data/sessions"
            - name: WARM_POOL_SIZE
              value: {{ .Values.warmPool.size | quote }}
            - name: IDLE_TIMEOUT_MS
              value: {{ .Values.sessions.idleTimeoutMs | quote }}
            - name: MESSAGE_TIMEOUT_MS
              value: {{ .Values.sessions.messageTimeoutMs | quote }}
            - name: CLEANUP_RUNNERS_ON_EXIT
              value: {{ .Values.sessions.cleanupOnExit | quote }}
            {{- if .Values.tenants.enabled }}
            - name: ENABLE_TENANTS
              value: "true"
            {{- end }}
            - name: CLAUDE_CODE_OAUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: claude-tokens
                  key: CLAUDE_CODE_OAUTH_TOKEN
            - name: GIT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: git-tokens
                  key: GIT_TOKEN
                  optional: true
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: git-tokens
                  key: GITHUB_TOKEN
                  optional: true
            {{- if .Values.obsidian.enabled }}
            - name: OBSIDIAN_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: obsidian-auth
                  key: OBSIDIAN_AUTH_TOKEN
                  optional: true
            - name: OBSIDIAN_E2EE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: obsidian-auth
                  key: OBSIDIAN_E2EE_PASSWORD
                  optional: true
            {{- end }}
          volumeMounts:
            - name: orchestrator-data
              mountPath: /data
            - name: sessions
              mountPath: /data/sessions
              readOnly: true
          resources:
            {{- toYaml .Values.orchestrator.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
        {{- if .Values.cloudflaredTunnel.enabled }}
        - name: cloudflared
          image: {{ .Values.cloudflaredTunnel.image }}
          args: ["tunnel", "run"]
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflare-tunnel
                  key: token
          resources:
            {{- toYaml .Values.cloudflaredTunnel.resources | nindent 12 }}
        {{- end }}
      volumes:
        - name: orchestrator-data
          persistentVolumeClaim:
            claimName: claude-orchestrator-data
        - name: sessions
          persistentVolumeClaim:
            claimName: claude-sessions
            readOnly: true
