apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "claude-runner.orchestratorName" . }}
---
# ClusterRole (not namespaced Role) — orchestrator manages pods across tenant namespaces
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "claude-runner.orchestratorName" . }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "get", "list", "delete", "patch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["create", "get", "list", "delete"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["create", "get", "list", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "get", "list", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "claude-runner.orchestratorName" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "claude-runner.orchestratorName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "claude-runner.orchestratorName" . }}
    namespace: {{ .Release.Namespace }}
