apiVersion: v1
kind: Service
metadata:
  name: {{ include "claude-runner.orchestratorName" . }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "claude-runner.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.httpPort }}
      targetPort: 8080
      {{- if eq .Values.service.type "NodePort" }}
      nodePort: {{ .Values.service.httpNodePort }}
      {{- end }}
    - name: ws
      port: {{ .Values.service.wsPort }}
      targetPort: 8081
      {{- if eq .Values.service.type "NodePort" }}
      nodePort: {{ .Values.service.wsNodePort }}
      {{- end }}
