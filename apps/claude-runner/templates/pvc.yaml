apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: claude-sessions
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.sessions.storageSize }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: claude-orchestrator-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.persistence.orchestrator.size }}
