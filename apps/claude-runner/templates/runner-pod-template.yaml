{{- /*
Reference Pod spec for runner containers.
This file is NOT applied — K8sManager creates pods programmatically.
Included for documentation and helm template validation only.
*/ -}}
{{- if false }}
apiVersion: v1
kind: Pod
metadata:
  name: runner-SESSION_ID
  labels:
    claude-orchestrator: "true"
    session-id: SESSION_ID
    role: session
spec:
  restartPolicy: Never
  containers:
    - name: runner
      image: {{ .Values.image.runner }}:{{ .Values.image.tag }}
      env:
        - name: RUNNER_SESSION_ID
          value: SESSION_ID
        - name: RUNNER_ORCHESTRATOR_URL
          value: "ws://{{ include "claude-runner.orchestratorName" . }}:8081"
        - name: CLAUDE_CODE_OAUTH_TOKEN
          value: "from-token-pool"
      volumeMounts:
        - name: sessions
          mountPath: /home/runner/.claude
      resources:
        {{- toYaml .Values.runner.resources | nindent 8 }}
  volumes:
    - name: sessions
      persistentVolumeClaim:
        claimName: claude-sessions
{{- end }}
