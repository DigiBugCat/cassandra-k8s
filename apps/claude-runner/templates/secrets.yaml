apiVersion: v1
kind: Secret
metadata:
  name: claude-tokens
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
type: Opaque
stringData:
  CLAUDE_CODE_OAUTH_TOKEN: "REPLACE_ME"
---
{{- if .Values.obsidian.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: obsidian-auth
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
type: Opaque
stringData:
  OBSIDIAN_AUTH_TOKEN: ""
  OBSIDIAN_E2EE_PASSWORD: ""
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: git-tokens
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
type: Opaque
stringData:
  GIT_TOKEN: ""
  GITHUB_TOKEN: ""
