# Dev environment overrides

orchestrator:
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

runner:
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "1Gi"

warmPool:
  size: 1

sessions:
  idleTimeoutMs: "1800000"    # 30 min (shorter for dev)
  storageSize: 5Gi

persistence:
  orchestrator:
    size: 1Gi

service:
  type: NodePort
  httpNodePort: 30180
  wsNodePort: 30181

obsidian:
  enabled: false

tenants:
  enabled: false
