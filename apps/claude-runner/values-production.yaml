# Production environment overrides

orchestrator:
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "512Mi"

runner:
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "2"
      memory: "2Gi"

warmPool:
  size: 2

sessions:
  idleTimeoutMs: "14400000"    # 4 hours
  storageSize: 10Gi

persistence:
  orchestrator:
    size: 1Gi

service:
  type: NodePort
  httpNodePort: 30080
  wsNodePort: 30081

obsidian:
  enabled: true

cloudflaredTunnel:
  enabled: true

tenants:
  enabled: true
